<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <!-- 定义滤镜 -->
    <defs>
        <!-- 红色渐变 -->
        <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#CC2222"/>
            <stop offset="50%" style="stop-color:#B22222"/>
            <stop offset="100%" style="stop-color:#8B0000"/>
        </linearGradient>
        
        <!-- 绿色渐变 - 为箭头添加 -->
        <linearGradient id="greenGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#34D37A"/>
            <stop offset="100%" style="stop-color:#28A45F"/>
        </linearGradient>
        
        <!-- 阴影效果 -->
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
            <feOffset dx="1" dy="1" result="offsetblur"/>
            <feFlood flood-color="#000000" flood-opacity="0.3"/>
            <feComposite in2="offsetblur" operator="in"/>
            <feMerge>
                <feMergeNode/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        
        <!-- 白色区域内发光 -->
        <filter id="innerGlow">
            <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
            <feOffset in="blur" dx="0" dy="0"/>
            <feComposite in2="SourceGraphic" operator="arithmetic" k2="-1" k3="1"/>
            <feFlood flood-color="#FFFFFF" flood-opacity="0.3"/>
            <feComposite in2="SourceGraphic" operator="in"/>
            <feMerge>
                <feMergeNode/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        
        <!-- 箭头阴影 -->
        <filter id="arrowShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="1"/>
            <feOffset dx="0" dy="1" result="offsetblur"/>
            <feFlood flood-color="#000000" flood-opacity="0.2"/>
            <feComposite in2="offsetblur" operator="in"/>
            <feMerge>
                <feMergeNode/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    
    <!-- 红色背景方块 -->
    <rect x="5" y="5" width="90" height="90" rx="4" 
          fill="url(#redGradient)" 
          filter="url(#shadow)"/>
    
    <!-- 白色背景区域 -->
    <rect x="15" y="15" width="70" height="35" 
          fill="white" 
          filter="url(#innerGlow)"
          rx="2"/>
    
    <!-- fx文本 -->
    <text x="50" y="40" 
          font-family="Arial, sans-serif" 
          font-size="26" 
          fill="#1A1A1A" 
          text-anchor="middle" 
          font-style="italic"
          font-weight="500">
        fx
    </text>
    
    <!-- 优化的绿色箭头组 -->
    <g filter="url(#arrowShadow)">
        <!-- 箭头杆 -->
        <rect x="25" y="57" width="35" height="5" 
              fill="url(#greenGradient)" 
              rx="1"/>
        <!-- 箭头头部 -->
        <path d="M70 59.5 l-12 -7 l0 14 l12 -7" 
              fill="url(#greenGradient)"/>
    </g>
</svg>